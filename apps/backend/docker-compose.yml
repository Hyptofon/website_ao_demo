services:
  # ── Qdrant Vector Database ───────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.13.4
    container_name: chatbot-qdrant
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC API
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/6333"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Go Backend ───────────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chatbot-backend
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - QDRANT_URL=qdrant
    volumes:
      - backend_data:/app/data
    depends_on:
      qdrant:
        condition: service_healthy
    restart: unless-stopped

volumes:
  qdrant_storage:
  backend_data:
